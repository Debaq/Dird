<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
            z-index: 1000;
        }
        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #0f0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="/dosbox-api.js"></script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Cargando...</div>
        <div id="status" style="font-size: 10px; margin-top: 10px; color: #666;">Inicializando...</div>
    </div>
    <div id="game-container"></div>

    <script>
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');

        function updateStatus(msg) {
            status.textContent = msg;
        }

        try {
            updateStatus('Inicializando...');

            var emulator = new Dosbox({
                id: "game-container",
                onload: function (dosbox) {
                    updateStatus('Cargando...');
                    dosbox.run("/game-data.zip", "./DOOM/DOOM.EXE");
                },
                onrun: function (dosbox, app) {
                    loading.style.display = 'none';
                }
            });

        } catch (error) {
            updateStatus('Error: ' + error.message);
        }
    </script>
</body>
</html>
