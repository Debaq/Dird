<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Objetos YOLOv8</title>
    <!-- Bibliotecas externas -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        canvas {
            display: block;
            border: 1px solid #ccc;
            margin-top: 10px;
            max-width: 100%;
            position: relative;
        }
        .model-selection {
            margin-bottom: 20px;
        }
        .loading {
            display: none;
            color: blue;
            font-weight: bold;
        }
        .file-upload {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .result-container {
            position: relative;
        }
        #tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            display: none;
        }
        #zoomModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            overflow: auto;
        }
        .modal-content {
            position: relative;
            margin: 5% auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .close-button {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-button:hover {
            color: #000;
        }
        #zoomCanvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            border: 1px solid #ddd;
        }
        .object-info {
            margin-top: 15px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
            font-size: 16px;
        }
        .pdf-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            display: block;
        }
        .pdf-button:hover {
            background-color: #45a049;
        }
        .pdf-button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Detector de Objetos con YOLOv8</h1>
        
        <div class="model-selection">
            <h2>Paso 1: Seleccionar modelo</h2>
            
            <!-- Cargar desde servidor -->
            <div>
                <label for="modelSelector">Seleccionar modelo del servidor:</label>
                <select id="modelSelector">
                    <option value="">-- Seleccione un modelo --</option>
                </select>
                <button id="loadServerModel">Cargar modelo seleccionado</button>
            </div>
            
            <!-- Cargar modelo personalizado -->
            <div class="file-upload">
                <label>O cargar modelo personalizado:</label>
                <input type="file" id="modelUpload" accept=".onnx,.yaml,.yml" multiple>
                <small>Puedes seleccionar el archivo .onnx y .yaml al mismo tiempo</small>
            </div>
            
            <div class="loading" id="modelLoading">Cargando modelo...</div>
            <div id="modelStatus"></div>
        </div>
        
        <div>
            <h2>Paso 2: Subir imagen</h2>
            <input type="file" id="imageUpload" accept="image/*" disabled>
            <div class="loading" id="imageLoading">Procesando imagen...</div>
        </div>
        
        <div class="result-container">
            <canvas id="resultCanvas"></canvas>
            <div id="tooltip"></div>
        </div>
        
        <div>
            <button id="generateReport" class="pdf-button" disabled>Generar Informe PDF</button>
        </div>
        
        <!-- Modal para el zoom -->
        <div id="zoomModal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h3>Detalle del objeto</h3>
                <canvas id="zoomCanvas"></canvas>
                <div class="object-info" id="objectInfo"></div>
            </div>
        </div>
    </div>

    <!-- Scripts propios -->
    <script src="detector.js"></script>
    <script src="report-generator.js"></script>
    <script src="pdf-generator.js"></script>


    <script>
        // Activar el botón de PDF manualmente
        setTimeout(function() {
          const btn = document.getElementById('generateReport');
          if (btn) {
            btn.disabled = false;
            btn.onclick = function() {
              if (typeof generatePDFReport === 'function') {
                generatePDFReport();
              } else {
                alert('Error: Función de generación de PDF no disponible');
              }
            };
            console.log('Botón de PDF activado manualmente');
          }
        }, 1000);
      </script>
</body>
</html>
